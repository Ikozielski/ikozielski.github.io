<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projetos · Iury Kozielski</title>
  <link rel="icon" type="image/png" href="assets/fotoPerfil-canalCS-semfundo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

  <header class="max-w-6xl mx-auto px-6 py-6 flex items-center justify-between">
    <a href="index.html" class="flex items-center">
      <img src="assets/fotoPerfil-canalCS.png" alt="Iury Kozielski" class="w-12 h-12 rounded-md object-contain" />
    </a>
    <nav class="hidden md:flex gap-8 text-base text-slate-300">
      <a href="index.html" class="flex items-center gap-2 hover:text-white transition"><i class="ti ti-home text-emerald-400"></i>Início</a>
      <a href="projetos.html" class="flex items-center gap-2 text-white"><i class="ti ti-device-gamepad-2 text-emerald-400"></i>Projetos</a>
      <a href="canal-cs2.html" class="flex items-center gap-2 hover:text-white transition"><i class="ti ti-video text-emerald-400"></i>Canal CS2</a>
      <a href="canal-pessoal.html" class="flex items-center gap-2 hover:text-white transition"><i class="ti ti-video text-emerald-400"></i>Canal Pessoal</a>
    </nav>
    <button type="button" id="btn-menu-mobile" class="md:hidden w-9 h-9 rounded-full bg-slate-800 hover:bg-slate-700 flex items-center justify-center transition" title="Menu" aria-label="Abrir menu" aria-expanded="false">
      <i class="ti ti-menu-2"></i>
    </button>
  </header>

  <!-- Menu mobile: vira dropdown abaixo do header quando a nav horizontal some (< md) -->
  <nav id="menu-mobile" class="hidden md:hidden max-w-6xl mx-auto px-6 pb-4 flex flex-col gap-1 text-sm text-slate-300">
    <a href="index.html" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-900 transition"><i class="ti ti-home text-emerald-400"></i>Início</a>
    <a href="projetos.html" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-900 text-white transition"><i class="ti ti-device-gamepad-2 text-emerald-400"></i>Projetos</a>
    <a href="canal-cs2.html" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-900 transition"><i class="ti ti-video text-emerald-400"></i>Canal CS2</a>
    <a href="canal-pessoal.html" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-900 transition"><i class="ti ti-video text-emerald-400"></i>Canal Pessoal</a>
  </nav>

  <main class="max-w-6xl mx-auto px-6 pb-16">
    <h1 class="text-3xl sm:text-4xl mb-8 flex items-center justify-center gap-3">
      <i class="ti ti-device-gamepad-2 text-emerald-400"></i>
      <span class="titulo-pagina">Projetos</span>
    </h1>

    <!-- Filtro por categoria -->
    <div class="flex flex-wrap gap-2 mb-8">
      <button data-filtro="todos" class="filtro-btn ativo px-4 py-1.5 rounded-full text-sm border border-slate-700 transition">Todos</button>
      <button data-filtro="jogos" class="filtro-btn px-4 py-1.5 rounded-full text-sm border border-slate-700 transition">Jogos</button>
      <button data-filtro="sistemas" class="filtro-btn px-4 py-1.5 rounded-full text-sm border border-slate-700 transition">Sistemas</button>
    </div>

    <!-- Grid de cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

      <div data-card-categoria="jogos" class="rounded-xl border border-slate-800 overflow-hidden hover:border-slate-600 transition">
        <a href="https://ytb-iurykzk.itch.io/paintfall" target="_blank" rel="noopener">
          <img src="assets/paintfall.png" alt="Capa do jogo PaintFall" class="w-full h-[70px] object-cover object-top" />
        </a>
        <div class="relative p-4">
          <h3 class="font-medium">PaintFall</h3>
          <p class="text-sm text-slate-400">Game Maker · GML</p>
          <a href="https://ytb-iurykzk.itch.io/paintfall" target="_blank" rel="noopener" class="inline-flex items-center gap-1 text-sm text-emerald-400 hover:text-emerald-300 transition mt-1">itch.io <i class="ti ti-external-link text-xs"></i></a>
          <a href="https://github.com/Ikozielski/Paintfall" target="_blank" rel="noopener" title="Repositório no GitHub" class="absolute right-3 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-white/10 text-white border border-white/30 hover:bg-white/20 flex items-center justify-center transition">
            <i class="ti ti-brand-github text-sm"></i>
          </a>
        </div>
      </div>

      <div data-card-categoria="jogos" class="rounded-xl border border-slate-800 overflow-hidden hover:border-slate-600 transition">
        <a href="https://ytb-iurykzk.itch.io/spaceshooter" target="_blank" rel="noopener">
          <img src="assets/spaceshooter.png" alt="Capa do jogo Space Shooter" class="w-full h-[70px] object-cover object-[center_90%]" />
        </a>
        <div class="relative p-4">
          <h3 class="font-medium">Space Shooter</h3>
          <p class="text-sm text-slate-400">Game Maker · GML</p>
          <a href="https://ytb-iurykzk.itch.io/spaceshooter" target="_blank" rel="noopener" class="inline-flex items-center gap-1 text-sm text-emerald-400 hover:text-emerald-300 transition mt-1">itch.io <i class="ti ti-external-link text-xs"></i></a>
          <a href="https://github.com/Ikozielski/SpaceShooter" target="_blank" rel="noopener" title="Repositório no GitHub" class="absolute right-3 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-white/10 text-white border border-white/30 hover:bg-white/20 flex items-center justify-center transition">
            <i class="ti ti-brand-github text-sm"></i>
          </a>
        </div>
      </div>

      <div data-card-categoria="jogos" class="rounded-xl border border-slate-800 overflow-hidden hover:border-slate-600 transition">
        <a href="https://ytb-iurykzk.itch.io/flappy-passaros" target="_blank" rel="noopener">
          <img src="assets/Flappy%20P%C3%A1ssaros.png" alt="Capa do jogo Flappy Pássaros" class="w-full h-[70px] object-cover object-[center_30%]" />
        </a>
        <div class="relative p-4">
          <h3 class="font-medium">Flappy Pássaros</h3>
          <p class="text-sm text-slate-400">Game Maker · GML</p>
          <a href="https://ytb-iurykzk.itch.io/flappy-passaros" target="_blank" rel="noopener" class="inline-flex items-center gap-1 text-sm text-emerald-400 hover:text-emerald-300 transition mt-1">itch.io <i class="ti ti-external-link text-xs"></i></a>
          <a href="https://github.com/Ikozielski/FlappyPassaros2" target="_blank" rel="noopener" title="Repositório no GitHub" class="absolute right-3 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-white/10 text-white border border-white/30 hover:bg-white/20 flex items-center justify-center transition">
            <i class="ti ti-brand-github text-sm"></i>
          </a>
        </div>
      </div>

      <div data-card-categoria="sistemas" class="rounded-xl border border-slate-800 overflow-hidden hover:border-slate-600 transition">
        <div class="card-cover h-[70px] flex items-center justify-center" data-categoria="sistemas">
          <i class="ti ti-server text-3xl text-white"></i>
        </div>
        <div class="relative p-4">
          <h3 class="font-medium">Marketplace de Skins CS</h3>
          <p class="text-sm text-slate-400">TypeScript</p>
          <span class="text-sm text-slate-500 mt-1 inline-block">Em breve</span>
        </div>
      </div>

    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
